name: install-sh
on:
  pull_request:
    paths:
      - 'install.sh'
      - 'packaging/test/**'
      - '.github/workflows/install-sh.yml'
permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: shellcheck
        run: shellcheck install.sh packaging/test/install_target.sh
      - name: target resolution
        run: sh packaging/test/install_target.sh
