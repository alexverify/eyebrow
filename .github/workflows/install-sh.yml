name: install-sh
on:
  pull_request:
    paths:
      - 'install.sh'
      - 'packaging/test/**'
      - '.github/workflows/install-sh.yml'
permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: shellcheck
        run: shellcheck install.sh packaging/test/install_target.sh
      - name: target resolution
        run: sh packaging/test/install_target.sh
