# CI: the same gate as `make check`, on Linux, macOS, and Windows.
# Actions are pinned by commit SHA — this repo is a supply-chain tool; we hold
# our own pipeline to the standard we scan for.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    # Git Bash on the Windows runner, so make/awk/grep in the Makefile resolve
    # the same way they do on Linux and macOS.
    shell: bash

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: make check
      - run: make build

  # Gate the .golangci.yml linters that `make check` (gofmt + vet + test) does
  # not run. The existing tree predates this gate and carries a backlog of
  # benign findings (mostly unchecked Close/Write); only-new-issues holds each
  # PR to the full linter set without forcing that backlog to be fixed first, so
  # no new drift lands while the cleanup happens incrementally. Pull-request only
  # because that is where only-new-issues has a reliable base ref to diff against
  # (fetch-depth: 0 makes the full history available for that diff). Linux-only:
  # lint results are OS-independent. The golangci-lint binary is version-pinned.
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.9.0
          only-new-issues: true
