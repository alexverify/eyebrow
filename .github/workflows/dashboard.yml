# Verify the Next.js dashboard still builds and static-exports. Runs only when
# the web app or its embed wiring changes. The built export is committed under
# internal/dashboard/assets (the Go binary embeds it), so the Go matrix never
# needs Node; this job guards the source from rotting.
name: dashboard

on:
  push:
    branches: [main]
    paths: ["controlplane/web/**", ".github/workflows/dashboard.yml"]
  pull_request:
    paths: ["controlplane/web/**", ".github/workflows/dashboard.yml"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controlplane/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: controlplane/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
