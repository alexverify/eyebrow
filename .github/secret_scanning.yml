# Secret scanning configuration.
#
# eyebrow is a supply-chain integrity tool whose own secret detector
# (internal/domain/secrets) is exercised against deliberately fabricated,
# credential-SHAPED fixtures (e.g. AWS's AKIAIOSFODNN7EXAMPLE doc key). These
# are not live credentials and require no rotation; GitHub flags them because it
# matches patterns, not validity. Exclude the detector package and all tests so
# the fixtures stop raising false-positive alerts.
paths-ignore:
  - "internal/domain/secrets/**"
  - "**/*_test.go"
