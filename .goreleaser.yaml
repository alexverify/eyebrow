# GoReleaser config: static cross-platform binaries with the version stamped
# into buildinfo, plus a checksums file so installs are verifiable.
# Validate with: goreleaser check && goreleaser release --snapshot --clean
version: 2

project_name: eyebrow

builds:
  - main: ./cmd/eyebrow
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/alexverify/eyebrow/internal/buildinfo.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Windows users expect a .zip.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  filters:
    exclude:
      - "^docs"
      - "^chore"

homebrew_casks:
  - repository:
      owner: alexverify
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/alexverify/eyebrow"
    description: "Supply-chain integrity for AI coding tools"
    license: "MIT"
    # Skip auto-commit on snapshot builds (no token, no real release).
    skip_upload: auto
    # eyebrow's release binaries are unsigned; strip the macOS quarantine
    # xattr on install so Gatekeeper doesn't block the CLI.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/eyebrow"]
          end
