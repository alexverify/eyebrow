# GoReleaser config: static cross-platform binaries with the version stamped
# into buildinfo, plus a checksums file so installs are verifiable.
# Validate with: goreleaser check && goreleaser release --snapshot --clean
version: 2

project_name: assay

builds:
  - main: ./cmd/assay
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/alexverify/assay/internal/buildinfo.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Windows users expect a .zip.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  filters:
    exclude:
      - "^docs"
      - "^chore"
